name: Intelligence Pipeline

# Runs the live-signal pipeline every day, commits the refreshed observations,
# scores and generated snapshot, and lets Vercel redeploy from the push. This is
# what accumulates real week-over-week momentum history for the sparklines.

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: intelligence-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/intelligence-exchange-ui
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest live signals
        env:
          # GITHUB_TOKEN is provided automatically. PRODUCT_HUNT_TOKEN and
          # NCBI_API_KEY are optional repo secrets — unset sources are skipped.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: npm run pipeline:ingest

      - name: Regenerate signal snapshot
        run: npm run pipeline:signals

      - name: Commit refreshed intelligence
        run: |
          git config user.name "horizoniq-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/pipeline lib/intelligence/generated-signals.ts
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(pipeline): daily intelligence refresh [skip ci]"
            git push origin feature/intelligence-exchange-ui
          fi
