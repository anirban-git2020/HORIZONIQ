name: Intelligence Pipeline

# Runs the live-signal pipeline every day, commits the refreshed observations,
# scores and generated snapshot, and lets Vercel redeploy from the push. This is
# what accumulates real week-over-week momentum history for the sparklines.

on:
  schedule:
    # Every 2 days at 06:00 UTC (odd calendar days — cron's standard "every other day").
    - cron: "0 6 */2 * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: intelligence-pipeline
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Operate on whichever branch triggered the run (the default branch for
          # the schedule). Works after the merge to main without further edits.
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          # PAT so the data-refresh commit pushes as the repo admin, who is on the
          # ruleset bypass list. Falls back to the default token if unset.
          token: ${{ secrets.PIPELINE_PAT || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ingest live signals
        env:
          # GITHUB_TOKEN is provided automatically. PRODUCT_HUNT_TOKEN and
          # NCBI_API_KEY are optional repo secrets — unset sources are skipped.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: npm run pipeline:ingest

      - name: Synthesize editorial (optional; skipped if no LLM key)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run pipeline:synthesize

      - name: Regenerate signal snapshot
        run: npm run pipeline:signals

      - name: Commit refreshed intelligence
        run: |
          git config user.name "horizoniq-bot"
          git config user.email "bot@users.noreply.github.com"
          # Commit only the source data. generated-signals.ts is a build artifact
          # (gitignored) — every deploy regenerates it, so it's never committed.
          git add data/pipeline
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(pipeline): scheduled intelligence refresh [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
